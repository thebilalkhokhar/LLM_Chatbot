services:
  mongodb:
    image: mongo:latest
    container_name: ai-saas-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--eval",
          "quit(db.adminCommand({ ping: 1 }).ok ? 0 : 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  ai-service:
    build:
      context: ./ai-service
    container_name: ai-saas-ai-service
    restart: unless-stopped
    env_file:
      - ./ai-service/.env
    environment:
      VECTOR_STORE_DIR: /app/storage/vectors
    ports:
      - "8000:8000"
    volumes:
      - ai_service_vectors:/app/storage/vectors
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    build:
      context: ./backend
    container_name: ai-saas-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      RUNNING_IN_DOCKER: "true"
    ports:
      - "4000:4000"
    depends_on:
      mongodb:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
    container_name: ai-saas-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

volumes:
  mongodb_data:
  ai_service_vectors:
